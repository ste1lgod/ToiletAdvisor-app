<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ToiletAdvisor</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Туалеты">

    <!-- Яндекс.Карты -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=45bd36a1-ed61-4910-bba7-c4c36f55877b&lang=ru_RU" type="text/javascript"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; font-family: Arial, sans-serif; }

        :root {
            --bg: #fff; --text: #333; --card-bg: #fff; --btn-bg: #4CAF50; --btn-text: #fff;
            --header-bg: #fff; --border: #ddd; --overlay-bg: rgba(0,0,0,0.5); --input-bg: #f5f5f5;
        }
        body.dark {
            --bg: #1a1a1a; --text: #eee; --card-bg: #2c2c2c; --btn-bg: #4CAF50; --btn-text: #fff;
            --header-bg: #2c2c2c; --border: #444; --overlay-bg: rgba(0,0,0,0.7); --input-bg: #3a3a3a;
        }

        body { background: var(--bg); color: var(--text); }

        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Верхняя панель */
        .header { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .header-title { background: var(--header-bg); padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .header-btns { display: flex; gap: 8px; }
        .header-btn { background: var(--header-bg); border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; color: var(--text); }

        /* Фильтры */
        .filters { position: absolute; top: 80px; left: 15px; right: 15px; z-index: 10; display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-btn { background: var(--header-bg); border: 1px solid var(--border); padding: 6px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; color: var(--text); white-space: nowrap; }
        .filter-btn.active { background: var(--btn-bg); color: var(--btn-text); border-color: var(--btn-bg); }

        /* Кнопка найти */
        .find-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; background: var(--btn-bg); color: var(--btn-text); border: none; padding: 12px 30px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* Карточка туалета */
        .card { position: absolute; bottom: 0; left: 0; right: 0; z-index: 20; background: var(--card-bg); border-radius: 20px 20px 0 0; padding: 20px; max-height: 70vh; overflow-y: auto; box-shadow: 0 -4px 20px rgba(0,0,0,0.2); display: none; }
        .card.active { display: block; }
        .card-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text); }
        .card-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .card-props { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .card-prop { background: var(--input-bg); padding: 5px 10px; border-radius: 10px; font-size: 13px; display: flex; align-items: center; gap: 4px; }
        .card-rating { color: #FFD700; font-size: 18px; margin-bottom: 10px; }
        .card-reviews { margin-bottom: 15px; }
        .card-review { background: var(--input-bg); padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 13px; }
        .card-review-user { font-weight: bold; margin-bottom: 4px; }
        .card-review-rating { color: #FFD700; }
        .card-btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; margin-bottom: 8px; font-weight: bold; }
        .card-btn.route { background: #2196F3; color: white; }
        .card-btn.review { background: #4CAF50; color: white; }
        .card-input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 8px; background: var(--input-bg); color: var(--text); resize: vertical; }

        /* Модальные окна */
        .modal { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 30; background: var(--overlay-bg); display: none; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); border-radius: 20px; padding: 25px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        .modal-title { font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .modal-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px; background: var(--input-bg); color: var(--text); font-size: 14px; }
        .modal-btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; margin-bottom: 8px; font-weight: bold; }
        .modal-btn.primary { background: #4CAF50; color: white; }
        .modal-btn.secondary { background: var(--input-bg); color: var(--text); }
        .modal-tabs { display: flex; margin-bottom: 15px; }
        .modal-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-bottom: 2px solid var(--border); color: var(--text); }
        .modal-tab.active { border-bottom: 2px solid #4CAF50; font-weight: bold; }
        .modal-link { color: #2196F3; text-align: center; display: block; margin-top: 10px; font-size: 12px; cursor: pointer; }

        /* Тема и язык */
        .settings-bar { position: absolute; top: 50px; right: 15px; z-index: 10; display: flex; gap: 5px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Верхняя панель -->
    <div class="header">
        <span class="header-title" id="headerTitle">🚽 ToiletAdvisor</span>
        <div class="header-btns">
            <button class="header-btn" id="themeToggle" title="Тема">🌓</button>
            <button class="header-btn" id="authBtn" title="Войти">👤</button>
            <select id="langSelect" class="header-btn" style="width: auto; padding: 0 5px; font-size: 12px;">
                <option value="ru">RU</option>
                <option value="en">EN</option>
                <option value="uzb">UZB</option>
            </select>
        </div>
    </div>

    <!-- Фильтры -->
    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="free">🆓 Бесплатные</button>
        <button class="filter-btn" data-filter="soap">🧼 С мылом</button>
        <button class="filter-btn" data-filter="paper">🧻 С бумагой</button>
        <button class="filter-btn" data-filter="accessible">♿ Доступные</button>
        <button class="filter-btn" data-filter="open">🟢 Открыто</button>
    </div>

    <!-- Кнопка найти -->
    <button class="find-btn" id="findBtn">🔍 Найти туалеты рядом</button>

    <!-- Карточка туалета -->
    <div class="card" id="card">
        <button class="card-close" id="cardClose">✕</button>
        <div class="card-title" id="cardTitle"></div>
        <div class="card-rating" id="cardRating"></div>
        <div class="card-props" id="cardProps"></div>
        <div class="card-reviews" id="cardReviews"></div>
        <textarea class="card-input" id="reviewText" rows="3" placeholder="Оставьте отзыв..."></textarea>
        <div style="display: flex; gap: 5px; margin-bottom: 8px;">
            <span style="cursor: pointer; font-size: 20px;" class="star" data-star="1">☆</span>
            <span style="cursor: pointer; font-size: 20px;" class="star" data-star="2">☆</span>
            <span style="cursor: pointer; font-size: 20px;" class="star" data-star="3">☆</span>
            <span style="cursor: pointer; font-size: 20px;" class="star" data-star="4">☆</span>
            <span style="cursor: pointer; font-size: 20px;" class="star" data-star="5">☆</span>
        </div>
        <button class="card-btn review" id="reviewBtn">📝 Отправить отзыв</button>
        <button class="card-btn route" id="routeBtn">🚗 Маршрут</button>
        <p style="font-size: 11px; color: #999; text-align: center;" id="reviewHint"></p>
    </div>

    <!-- Модальное окно: Регистрация / Вход -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="modal-tabs">
                <div class="modal-tab active" id="tabLogin">Вход</div>
                <div class="modal-tab" id="tabRegister">Регистрация</div>
            </div>
            <input class="modal-input" id="authPhone" type="tel" placeholder="Номер телефона">
            <input class="modal-input" id="authPassword" type="password" placeholder="Пароль">
            <button class="modal-btn primary" id="authSubmitBtn">Войти</button>
            <button class="modal-btn secondary" id="authCloseBtn">Отмена</button>
            <span class="modal-link" id="adminLoginLink">🔑 Войти как администратор (расширенный доступ)</span>
        </div>
    </div>

    <!-- Модальное окно: Вход администратора -->
    <div class="modal" id="adminModal">
        <div class="modal-content">
            <div class="modal-title">Вход администратора</div>
            <input class="modal-input" id="adminLogin" type="text" placeholder="Логин">
            <input class="modal-input" id="adminPassword" type="password" placeholder="Пароль">
            <button class="modal-btn primary" id="adminSubmitBtn">Войти</button>
            <button class="modal-btn secondary" id="adminCloseBtn">Отмена</button>
        </div>
    </div>

    <!-- Модальное окно: Добавить туалет (для админа) -->
    <div class="modal" id="addToiletModal">
        <div class="modal-content">
            <div class="modal-title">Добавить туалет</div>
            <input class="modal-input" id="addTitle" type="text" placeholder="Название">
            <label><input type="checkbox" id="addIsFree" checked> Бесплатный</label>
            <label><input type="checkbox" id="addIsOpen" checked> Открыто</label>
            <label><input type="checkbox" id="addHasSoap"> Мыло</label>
            <label><input type="checkbox" id="addHasPaper"> Бумага</label>
            <label><input type="checkbox" id="addIsAccessible"> Доступность</label>
            <button class="modal-btn primary" id="addSubmitBtn">Добавить</button>
            <button class="modal-btn secondary" id="addCloseBtn">Отмена</button>
        </div>
    </div>

    <script>
        // ==================== НАСТРОЙКИ ====================
        const API_URL = 'https://toiletadvisor-server.onrender.com/api';
        const YANDEX_API_KEY = '45bd36a1-ed61-4910-bba7-c4c36f55877b';

        // ==================== ПЕРЕВОДЫ ====================
        const translations = {
            ru: {
                headerTitle: '🚽 ToiletAdvisor',
                findBtn: '🔍 Найти туалеты рядом',
                all: 'Все',
                free: '🆓 Бесплатные',
                soap: '🧼 С мылом',
                paper: '🧻 С бумагой',
                accessible: '♿ Доступные',
                open: '🟢 Открыто',
                reviewPlaceholder: 'Оставьте отзыв...',
                reviewBtn: '📝 Отправить отзыв',
                routeBtn: '🚗 Маршрут',
                reviewHint: '',
                loginTab: 'Вход',
                registerTab: 'Регистрация',
                authSubmitLogin: 'Войти',
                authSubmitRegister: 'Зарегистрироваться',
                cancel: 'Отмена',
                adminLink: '🔑 Войти как администратор (расширенный доступ)',
                adminTitle: 'Вход администратора',
                addTitle: 'Добавить туалет',
                addSubmit: 'Добавить',
                pleaseLogin: 'Чтобы оставить оценку, пожалуйста, войдите в систему',
                freeText: 'Бесплатно',
                paidText: 'Платно',
                openText: 'Открыто',
                closedText: 'Закрыто',
                kmAway: 'км от вас'
            },
            en: {
                headerTitle: '🚽 ToiletAdvisor',
                findBtn: '🔍 Find toilets nearby',
                all: 'All',
                free: '🆓 Free',
                soap: '🧼 With soap',
                paper: '🧻 With paper',
                accessible: '♿ Accessible',
                open: '🟢 Open',
                reviewPlaceholder: 'Leave a review...',
                reviewBtn: '📝 Submit review',
                routeBtn: '🚗 Route',
                reviewHint: '',
                loginTab: 'Login',
                registerTab: 'Register',
                authSubmitLogin: 'Login',
                authSubmitRegister: 'Register',
                cancel: 'Cancel',
                adminLink: '🔑 Login as admin (extended access)',
                adminTitle: 'Admin Login',
                addTitle: 'Add toilet',
                addSubmit: 'Add',
                pleaseLogin: 'Please login to leave a review',
                freeText: 'Free',
                paidText: 'Paid',
                openText: 'Open',
                closedText: 'Closed',
                kmAway: 'km away'
            },
            uzb: {
                headerTitle: '🚽 ToiletAdvisor',
                findBtn: '🔍 Yaqin atrofdagi hojatxonalar',
                all: 'Hammasi',
                free: '🆓 Bepul',
                soap: '🧼 Sovun bor',
                paper: '🧻 Qog\'oz bor',
                accessible: '♿ Qulay',
                open: '🟢 Ochiq',
                reviewPlaceholder: 'Sharh qoldiring...',
                reviewBtn: '📝 Sharh yuborish',
                routeBtn: '🚗 Marshrut',
                reviewHint: '',
                loginTab: 'Kirish',
                registerTab: 'Ro\'yxatdan o\'tish',
                authSubmitLogin: 'Kirish',
                authSubmitRegister: 'Ro\'yxatdan o\'tish',
                cancel: 'Bekor qilish',
                adminLink: '🔑 Administrator sifatida kirish',
                adminTitle: 'Admin kirish',
                addTitle: 'Hojatxona qo\'shish',
                addSubmit: 'Qo\'shish',
                pleaseLogin: 'Sharh qoldirish uchun tizimga kiring',
                freeText: 'Bepul',
                paidText: 'Pullik',
                openText: 'Ochiq',
                closedText: 'Yopiq',
                kmAway: 'km uzoqlikda'
            }
        };

        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let myMap, currentPlacemark, currentUser = null;
        let allToilets = [], currentFilter = 'all', selectedToilet = null;
        let lang = 'ru', reviewRating = 0, authMode = 'login';
        let addToiletCoords = null;

        // Получить перевод
        function t(key) {
            return translations[lang]?.[key] || translations.ru[key] || key;
        }

        // Обновить весь текст на странице
        function updateTexts() {
            document.getElementById('headerTitle').textContent = t('headerTitle');
            document.getElementById('findBtn').textContent = t('findBtn');
            document.getElementById('reviewBtn').textContent = t('reviewBtn');
            document.getElementById('routeBtn').textContent = t('routeBtn');
            document.getElementById('reviewText').placeholder = t('reviewPlaceholder');
            document.getElementById('tabLogin').textContent = t('loginTab');
            document.getElementById('tabRegister').textContent = t('registerTab');
            document.getElementById('adminLoginLink').textContent = t('adminLink');
            document.getElementById('adminCloseBtn').textContent = t('cancel');
            document.getElementById('addCloseBtn').textContent = t('cancel');
            document.getElementById('authCloseBtn').textContent = t('cancel');
            document.getElementById('authSubmitBtn').textContent = authMode === 'login' ? t('authSubmitLogin') : t('authSubmitRegister');
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const f = btn.dataset.filter;
                if (f === 'all') btn.textContent = t('all');
                if (f === 'free') btn.textContent = t('free');
                if (f === 'soap') btn.textContent = t('soap');
                if (f === 'paper') btn.textContent = t('paper');
                if (f === 'accessible') btn.textContent = t('accessible');
                if (f === 'open') btn.textContent = t('open');
            });
        }

        // ==================== ТЕМА ====================
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') document.body.classList.add('dark');
        document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
        });

        // ==================== ЯЗЫК ====================
        lang = localStorage.getItem('lang') || 'ru';
        document.getElementById('langSelect').value = lang;
        document.getElementById('langSelect').addEventListener('change', (e) => {
            lang = e.target.value;
            localStorage.setItem('lang', lang);
            updateTexts();
            if (selectedToilet) showToiletCard(selectedToilet);
        });
        updateTexts();

        // ==================== КАРТА ====================
        ymaps.ready(() => {
            myMap = new ymaps.Map('map', {
                center: [55.751244, 37.618423],
                zoom: 13,
                controls: ['zoomControl']
            });

            // Загружаем туалеты с сервера
            loadToilets();

            // Долгое нажатие для админа
            myMap.events.add('click', (e) => {
                if (currentUser && currentUser.role === 'admin') {
                    addToiletCoords = e.get('coords');
                    document.getElementById('addToiletModal').classList.add('active');
                }
            });
        });

        // ==================== ЗАГРУЗКА ТУАЛЕТОВ ====================
        async function loadToilets() {
            try {
                const res = await fetch(`${API_URL}/toilets`);
                allToilets = await res.json();
                renderMarkers();
            } catch (err) {
                console.error('Ошибка загрузки туалетов:', err);
            }
        }

        function renderMarkers() {
            if (!myMap) return;
            myMap.geoObjects.removeAll();

            let filtered = allToilets;
            if (currentFilter === 'free') filtered = allToilets.filter(t => t.isFree);
            if (currentFilter === 'soap') filtered = allToilets.filter(t => t.hasSoap);
            if (currentFilter === 'paper') filtered = allToilets.filter(t => t.hasPaper);
            if (currentFilter === 'accessible') filtered = allToilets.filter(t => t.isAccessible);
            if (currentFilter === 'open') filtered = allToilets.filter(t => t.isOpen);

            filtered.forEach(toilet => {
                const color = toilet.isFree ? 'green' : 'orange';
                const placemark = new ymaps.Placemark(
                    [toilet.lat, toilet.lon],
                    { balloonContent: toilet.title },
                    { preset: `islands#${color}DotIcon` }
                );
                placemark.events.add('click', () => showToiletCard(toilet));
                myMap.geoObjects.add(placemark);
            });
        }

        // ==================== КАРТОЧКА ТУАЛЕТА ====================
        function showToiletCard(toilet) {
            selectedToilet = toilet;
            document.getElementById('card').classList.add('active');
            document.getElementById('cardTitle').textContent = toilet.title;

            // Рейтинг
            loadReviews(toilet.id).then(reviews => {
                const avg = reviews.length > 0
                    ? (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1)
                    : '—';
                const stars = '★'.repeat(Math.round(avg)) + '☆'.repeat(5 - Math.round(avg));
                document.getElementById('cardRating').textContent = `${stars} ${avg}`;

                // Отзывы
                const reviewsHtml = reviews.slice(-5).map(r => `
                    <div class="card-review">
                        <div class="card-review-user">${r.userPhone} <span class="card-review-rating">${'★'.repeat(r.rating)}</span></div>
                        <div>${r.text}</div>
                    </div>
                `).join('');
                document.getElementById('cardReviews').innerHTML = reviewsHtml || '<p style="color: #999;">Нет отзывов</p>';
            });

            // Свойства
            const props = [];
            if (toilet.isOpen) props.push({ emoji: '🟢', text: t('openText') });
            else props.push({ emoji: '🔴', text: t('closedText') });
            if (toilet.isFree) props.push({ emoji: '🆓', text: t('freeText') });
            else props.push({ emoji: '💰', text: t('paidText') });
            if (toilet.hasSoap) props.push({ emoji: '🧼', text: 'Мыло' });
            if (toilet.hasPaper) props.push({ emoji: '🧻', text: 'Бумага' });
            if (toilet.isAccessible) props.push({ emoji: '♿', text: 'Доступно' });

            // Расстояние
            if (myMap) {
                const userCoords = myMap.getCenter();
                const dist = ymaps.coordSystem.geo.getDistance(
                    [toilet.lat, toilet.lon],
                    [userCoords[0], userCoords[1]]
                );
                const km = (dist / 1000).toFixed(1);
                props.push({ emoji: '📍', text: `${km} ${t('kmAway')}` });
            }

            document.getElementById('cardProps').innerHTML = props.map(p =>
                `<span class="card-prop">${p.emoji} ${p.text}</span>`
            ).join('');

            document.getElementById('reviewText').value = '';
            reviewRating = 0;
            document.querySelectorAll('.star').forEach(s => s.textContent = '☆');
            document.getElementById('reviewHint').textContent = '';
        }

        async function loadReviews(toiletId) {
            try {
                const res = await fetch(`${API_URL}/reviews/${toiletId}`);
                return await res.json();
            } catch (err) {
                return [];
            }
        }

        // ==================== ЗВЁЗДЫ ====================
        document.querySelectorAll('.star').forEach(star => {
            star.addEventListener('click', function() {
                reviewRating = parseInt(this.dataset.star);
                document.querySelectorAll('.star').forEach((s, i) => {
                    s.textContent = i < reviewRating ? '★' : '☆';
                });
            });
        });

        // ==================== ОТПРАВКА ОТЗЫВА ====================
        document.getElementById('reviewBtn').addEventListener('click', async () => {
            if (!currentUser) {
                document.getElementById('reviewHint').textContent = t('pleaseLogin');
                return;
            }
            const text = document.getElementById('reviewText').value.trim();
            if (!text || reviewRating === 0) {
                document.getElementById('reviewHint').textContent = 'Введите текст и поставьте оценку';
                return;
            }
            try {
                const res = await fetch(`${API_URL}/reviews`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.token}`
                    },
                    body: JSON.stringify({ toiletId: selectedToilet.id, text, rating: reviewRating })
                });
                if (res.ok) {
                    document.getElementById('reviewHint').textContent = '✅ Отзыв отправлен!';
                    showToiletCard(selectedToilet);
                }
            } catch (err) {
                document.getElementById('reviewHint').textContent = '❌ Ошибка';
            }
        });

        // ==================== МАРШРУТ ====================
        document.getElementById('routeBtn').addEventListener('click', () => {
            if (!selectedToilet) return;
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const url = `https://yandex.ru/maps/?rtext=${pos.coords.latitude},${pos.coords.longitude}~${selectedToilet.lat},${selectedToilet.lon}&rtt=pd`;
                    window.open(url, '_blank');
                },
                () => {
                    const url = `https://yandex.ru/maps/?rtext=~${selectedToilet.lat},${selectedToilet.lon}&rtt=pd`;
                    window.open(url, '_blank');
                }
            );
        });

        // ==================== ЗАКРЫТИЕ КАРТОЧКИ ====================
        document.getElementById('cardClose').addEventListener('click', () => {
            document.getElementById('card').classList.remove('active');
            selectedToilet = null;
        });

        // ==================== ФИЛЬТРЫ ====================
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderMarkers();
            });
        });

        // ==================== ПОИСК РЯДОМ ====================
        document.getElementById('findBtn').addEventListener('click', () => {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    myMap.setCenter([pos.coords.latitude, pos.coords.longitude], 15);
                    // Поиск через Яндекс.Организации
                    ymaps.geocode('туалет', {
                        results: 10,
                        boundedBy: myMap.getBounds()
                    }).then((res) => {
                        res.geoObjects.each((obj) => {
                            const coords = obj.geometry.getCoordinates();
                            // Добавляем маркер временно
                            const pm = new ymaps.Placemark(
                                coords,
                                { balloonContent: obj.properties.get('name') },
                                { preset: 'islands#blueDotIcon' }
                            );
                            myMap.geoObjects.add(pm);
                        });
                    });
                },
                () => alert('Не удалось определить местоположение')
            );
        });

        // ==================== РЕГИСТРАЦИЯ / ВХОД ====================
        document.getElementById('authBtn').addEventListener('click', () => {
            document.getElementById('authModal').classList.add('active');
            setAuthMode('login');
        });

        document.getElementById('authCloseBtn').addEventListener('click', () => {
            document.getElementById('authModal').classList.remove('active');
        });

        document.getElementById('tabLogin').addEventListener('click', () => setAuthMode('login'));
        document.getElementById('tabRegister').addEventListener('click', () => setAuthMode('register'));

        function setAuthMode(mode) {
            authMode = mode;
            document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
            document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
            document.getElementById('authSubmitBtn').textContent = mode === 'login' ? t('authSubmitLogin') : t('authSubmitRegister');
        }

        document.getElementById('authSubmitBtn').addEventListener('click', async () => {
            const phone = document.getElementById('authPhone').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            if (!phone || !password) return alert('Заполните все поля');

            const endpoint = authMode === 'login' ? '/login' : '/register';
            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                const data = await res.json();
                if (res.ok) {
                    currentUser = { ...data.user, token: data.token };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    document.getElementById('authModal').classList.remove('active');
                    updateAuthUI();
                    alert(data.message);
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert('Ошибка соединения');
            }
        });

        // ==================== ВХОД АДМИНИСТРАТОРА ====================
        document.getElementById('adminLoginLink').addEventListener('click', () => {
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('adminModal').classList.add('active');
        });

        document.getElementById('adminCloseBtn').addEventListener('click', () => {
            document.getElementById('adminModal').classList.remove('active');
        });

        document.getElementById('adminSubmitBtn').addEventListener('click', async () => {
            const login = document.getElementById('adminLogin').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            if (!login || !password) return alert('Заполните все поля');

            try {
                const res = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, password })
                });
                const data = await res.json();
                if (res.ok) {
                    currentUser = { ...data.user, token: data.token };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    document.getElementById('adminModal').classList.remove('active');
                    updateAuthUI();
                    alert(data.message);
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert('Ошибка соединения');
            }
        });

        // ==================== ДОБАВЛЕНИЕ ТУАЛЕТА (АДМИН) ====================
        document.getElementById('addCloseBtn').addEventListener('click', () => {
            document.getElementById('addToiletModal').classList.remove('active');
        });

        document.getElementById('addSubmitBtn').addEventListener('click', async () => {
            const title = document.getElementById('addTitle').value.trim();
            if (!title) return alert('Введите название');
            if (!addToiletCoords) return;

            const toiletData = {
                lat: addToiletCoords[0],
                lon: addToiletCoords[1],
                title: title,
                isOpen: document.getElementById('addIsOpen').checked,
                isFree: document.getElementById('addIsFree').checked,
                hasSoap: document.getElementById('addHasSoap').checked,
                hasPaper: document.getElementById('addHasPaper').checked,
                isAccessible: document.getElementById('addIsAccessible').checked
            };

            try {
                const res = await fetch(`${API_URL}/toilets`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.token}`
                    },
                    body: JSON.stringify(toiletData)
                });
                if (res.ok) {
                    document.getElementById('addToiletModal').classList.remove('active');
                    loadToilets();
                    alert('Туалет добавлен!');
                }
            } catch (err) {
                alert('Ошибка');
            }
        });

        // ==================== ВОССТАНОВЛЕНИЕ СЕССИИ ====================
        function updateAuthUI() {
            const btn = document.getElementById('authBtn');
            if (currentUser) {
                btn.textContent = currentUser.role === 'admin' ? '🔧' : '👤✓';
                btn.title = currentUser.phone || currentUser.login;
            } else {
                btn.textContent = '👤';
                btn.title = 'Войти';
            }
        }

        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            updateAuthUI();
        }
    </script>
</body>
</html>
