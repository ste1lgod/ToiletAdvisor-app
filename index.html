<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>ToiletAdvisor</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Туалеты">

    <!-- Яндекс.Карты -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=45bd36a1-ed61-4910-bba7-c4c36f55877b&lang=ru_RU" type="text/javascript"></script>

    <style>
        /* ========== RESET & BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
        }

        /* ========== ЦВЕТОВАЯ СХЕМА ========== */
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --primary-light: #e8f8ef;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --header-bg: #ffffff;
            --nav-bg: #ffffff;
            --input-bg: #f3f4f6;
            --star-color: #f59e0b;
            --badge-open: #10b981;
            --badge-closed: #ef4444;
        }

        body.dark {
            --bg: #0f0f1a;
            --card-bg: #1e1e2e;
            --text: #e8e8f0;
            --text-secondary: #9ca3af;
            --border: #2d2d44;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            --header-bg: #1a1a2e;
            --nav-bg: #1a1a2e;
            --input-bg: #2d2d44;
            --star-color: #f59e0b;
        }

        /* ========== КАРТА ========== */
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* ========== ВЕРХНЯЯ ПАНЕЛЬ ========== */
        .header {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--header-bg);
            padding: 8px 16px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.92);
        }
        body.dark .header {
            background: rgba(26, 26, 46, 0.92);
        }

        .header-title {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-title span {
            color: var(--primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-btn {
            background: none;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            transition: background 0.2s;
        }
        .header-btn:hover {
            background: var(--input-bg);
        }

        .lang-select {
            background: none;
            border: none;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 8px;
        }
        .lang-select:hover {
            background: var(--input-bg);
        }
        .lang-select option {
            background: var(--card-bg);
            color: var(--text);
        }

        /* ========== ПОИСК ========== */
        .search-bar {
            position: absolute;
            top: 72px;
            left: 12px;
            right: 12px;
            z-index: 10;
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 0 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 8px;
            font-size: 14px;
            color: var(--text);
            outline: none;
        }
        .search-bar input::placeholder {
            color: var(--text-secondary);
        }
        .search-bar .search-icon {
            color: var(--text-secondary);
            font-size: 18px;
        }

        /* ========== КАТЕГОРИИ (чипсы) ========== */
        .categories {
            position: absolute;
            top: 124px;
            left: 12px;
            right: 12px;
            z-index: 10;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            flex-shrink: 0;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: var(--card-bg);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow);
            white-space: nowrap;
        }
        .category-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .category-chip .emoji {
            margin-right: 4px;
        }

        /* ========== КАРТОЧКА ТУАЛЕТА (нижний лист) ========== */
        .toilet-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
            background: var(--card-bg);
            border-radius: 24px 24px 0 0;
            padding: 20px 20px 100px;
            max-height: 75vh;
            overflow-y: auto;
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.15);
            display: none;
            transition: transform 0.3s ease;
        }
        .toilet-sheet.active {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            margin: 0 auto 16px;
        }

        .sheet-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .sheet-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text);
        }

        .sheet-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .sheet-rating .stars {
            color: var(--star-color);
            font-size: 18px;
            letter-spacing: 2px;
        }
        .sheet-rating .rating-value {
            font-weight: 600;
            color: var(--text);
        }
        .sheet-rating .rating-count {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .sheet-distance {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .sheet-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .sheet-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            background: var(--input-bg);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .sheet-badge.open {
            background: #d1fae5;
            color: #065f46;
        }
        .sheet-badge.closed {
            background: #fee2e2;
            color: #991b1b;
        }
        .sheet-badge.free {
            background: #dbeafe;
            color: #1e40af;
        }
        .sheet-badge.paid {
            background: #fef3c7;
            color: #92400e;
        }
        body.dark .sheet-badge.open {
            background: #064e3b;
            color: #a7f3d0;
        }
        body.dark .sheet-badge.closed {
            background: #7f1d1d;
            color: #fca5a5;
        }
        body.dark .sheet-badge.free {
            background: #1e3a5f;
            color: #93c5fd;
        }
        body.dark .sheet-badge.paid {
            background: #78350f;
            color: #fcd34d;
        }

        .sheet-description {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: var(--input-bg);
            border-radius: var(--radius-sm);
        }

        /* ========== ОТЗЫВЫ ========== */
        .sheet-reviews-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 12px;
            color: var(--text);
        }

        .sheet-review {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .sheet-review:last-child {
            border-bottom: none;
        }

        .review-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        .review-avatar.gray {
            background: var(--text-secondary);
        }

        .review-body {
            flex: 1;
        }
        .review-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }
        .review-date {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .review-stars {
            color: var(--star-color);
            font-size: 13px;
            letter-spacing: 1px;
        }
        .review-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
            line-height: 1.5;
        }

        /* ========== ФОРМА ОТЗЫВА ========== */
        .review-form {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .review-form textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 14px;
            resize: vertical;
            min-height: 70px;
            font-family: inherit;
        }
        .review-form textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .review-form .star-select {
            display: flex;
            gap: 4px;
            margin: 10px 0;
            font-size: 24px;
            cursor: pointer;
        }
        .review-form .star-select span {
            color: var(--border);
            transition: color 0.2s;
        }
        .review-form .star-select span.active {
            color: var(--star-color);
        }

        .review-form .submit-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .review-form .submit-row button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .review-form .submit-row button:hover {
            opacity: 0.85;
        }
        .review-form .submit-row .btn-primary {
            background: var(--primary);
            color: white;
        }
        .review-form .submit-row .btn-route {
            background: var(--input-bg);
            color: var(--text);
        }
        .review-form .hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            text-align: center;
        }
        .review-form .hint.error {
            color: #ef4444;
        }
        .review-form .hint.success {
            color: var(--primary);
        }

        /* ========== НИЖНЯЯ НАВИГАЦИЯ ========== */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 15;
            background: var(--nav-bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 env(safe-area-inset-bottom, 8px) 0;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.95);
        }
        body.dark .bottom-nav {
            background: rgba(26, 26, 46, 0.95);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            padding: 4px 16px;
            transition: color 0.2s;
            position: relative;
        }
        .nav-item.active {
            color: var(--primary);
        }
        .nav-item .nav-icon {
            font-size: 22px;
        }
        .nav-item .nav-label {
            font-weight: 500;
        }
        .nav-item .badge-dot {
            position: absolute;
            top: 2px;
            right: 8px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            border: 2px solid var(--nav-bg);
        }

        /* ========== МОДАЛЬНЫЕ ОКНА ========== */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 30;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 28px 24px;
            width: 92%;
            max-width: 400px;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-box .modal-title {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            color: var(--text);
        }
        .modal-box .modal-sub {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .modal-box input {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 14px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .modal-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-box .modal-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 8px;
        }
        .modal-box .modal-btn:hover {
            opacity: 0.85;
        }
        .modal-box .modal-btn.primary {
            background: var(--primary);
            color: white;
        }
        .modal-box .modal-btn.secondary {
            background: var(--input-bg);
            color: var(--text);
        }
        .modal-box .modal-btn.danger {
            background: #ef4444;
            color: white;
        }

        .modal-box .modal-tabs {
            display: flex;
            margin-bottom: 16px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .modal-box .modal-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            background: var(--input-bg);
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .modal-box .modal-tab.active {
            background: var(--primary);
            color: white;
        }

        .modal-box .modal-link {
            display: block;
            text-align: center;
            color: var(--primary);
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
            font-weight: 500;
        }
        .modal-box .modal-link:hover {
            text-decoration: underline;
        }

        .modal-box .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .modal-box .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            background: var(--input-bg);
        }
        .modal-box .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        /* ========== АДАПТИВ ========== */
        @media (max-width: 480px) {
            .header-title {
                font-size: 14px;
            }
            .category-chip {
                font-size: 12px;
                padding: 6px 14px;
            }
            .sheet-title {
                font-size: 18px;
            }
        }

        /* ========== ЗАГРУЗКА ========== */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* ========== АДМИН БАДЖ ========== */
        .admin-badge {
            background: #ef4444;
            color: white;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 6px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- ===== ВЕРХНЯЯ ПАНЕЛЬ ===== -->
    <div class="header" id="header">
        <div class="header-title">🚽 Toilet<span>Advisor</span></div>
        <div class="header-right">
            <select class="lang-select" id="langSelect">
                <option value="ru">RU</option>
                <option value="en">EN</option>
                <option value="uzb">UZB</option>
            </select>
            <button class="header-btn" id="themeToggle" title="Тема">🌙</button>
            <button class="header-btn" id="authBtn" title="Войти">👤</button>
        </div>
    </div>

    <!-- ===== ПОИСК ===== -->
    <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Поиск туалета...">
    </div>

    <!-- ===== КАТЕГОРИИ ===== -->
    <div class="categories" id="categories">
        <button class="category-chip active" data-category="all">📋 Всем</button>
        <button class="category-chip" data-category="taharatkhana">🕌 Тахаратхана</button>
        <button class="category-chip" data-category="free">🆓 Бесплатно</button>
        <button class="category-chip" data-category="soap">🧼 С мылом</button>
        <button class="category-chip" data-category="paper">🧻 С бумагой</button>
        <button class="category-chip" data-category="accessible">♿ Доступные</button>
        <button class="category-chip" data-category="open">🟢 Открыто</button>
    </div>

    <!-- ===== КАРТОЧКА ТУАЛЕТА (нижний лист) ===== -->
    <div class="toilet-sheet" id="toiletSheet">
        <div class="sheet-handle"></div>
        <button class="sheet-close" id="sheetClose">✕</button>

        <div class="sheet-title" id="sheetTitle">Название</div>
        <div class="sheet-rating">
            <span class="stars" id="sheetStars">★★★★★</span>
            <span class="rating-value" id="sheetRatingValue">4.0</span>
            <span class="rating-count" id="sheetRatingCount">(12 отзывов)</span>
        </div>
        <div class="sheet-distance" id="sheetDistance">📍 1.2 км от вас</div>
        <div class="sheet-badges" id="sheetBadges"></div>
        <div class="sheet-description" id="sheetDescription">Описание туалета</div>

        <div class="sheet-reviews-title">📝 Отзывы</div>
        <div id="sheetReviews"></div>

        <div class="review-form" id="reviewForm">
            <textarea id="reviewText" placeholder="Опишите ваши впечатления..." rows="3"></textarea>
            <div class="star-select" id="starSelect">
                <span data-star="1">☆</span>
                <span data-star="2">☆</span>
                <span data-star="3">☆</span>
                <span data-star="4">☆</span>
                <span data-star="5">☆</span>
            </div>
            <div class="submit-row">
                <button class="btn-primary" id="reviewSubmit">📝 Отправить</button>
                <button class="btn-route" id="routeBtn">🚗 Маршрут</button>
            </div>
            <div class="hint" id="reviewHint"></div>
        </div>
    </div>

    <!-- ===== НИЖНЯЯ НАВИГАЦИЯ ===== -->
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-tab="map">
            <span class="nav-icon">🗺️</span>
            <span class="nav-label">Карта</span>
        </button>
        <button class="nav-item" data-tab="add" id="navAdd">
            <span class="nav-icon">➕</span>
            <span class="nav-label">Добавить</span>
        </button>
        <button class="nav-item" data-tab="profile">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Профиль</span>
        </button>
    </div>

    <!-- ===== МОДАЛ: АВТОРИЗАЦИЯ ===== -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-box">
            <div class="modal-title">Добро пожаловать</div>
            <div class="modal-sub">Toilet Advisor Tashkent</div>

            <div class="modal-tabs">

            }
            return name.slice(0, 2).toUpperCase();

        function formatDate(dateStr) {

            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        function getStarString(rating) {
            const full = Math.floor(rating);
            const half = rating - full >= 0.5 ? 1 : 0;
            const empty = 5 - full - half;
            return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
        }

// Инициализация карты с задержкой и повторной попыткой
function initMap() {
    try {
        myMap = new ymaps.Map('map', {
            center: [41.2995, 69.2401],  // Ташкент
            zoom: 12,
            controls: ['zoomControl', 'fullscreenControl']

        loadToilets();

        // Клик по карте для добавления (админ)
        myMap.events.add('click', (e) => {
            if (document.getElementById('addModal').classList.contains('active')) {
                addToiletCoords = e.get('coords');
                document.getElementById('addHint').textContent = `📍 Выбрано: ${addToiletCoords[0].toFixed(5)}, ${addToiletCoords[1].toFixed(5)}`;
                document.getElementById('addHint').style.color = 'var(--primary)';
            }
        });

        // Долгий клик для админа
        let longPressTimer = null;
        myMap.events.add('pressstart', (e) => {
            if (!currentUser || currentUser.role !== 'admin') return;
            longPressTimer = setTimeout(() => {
                addToiletCoords = e.get('coords');
                document.getElementById('addModal').classList.add('active');
                document.getElementById('addHint').textContent = `📍 ${addToiletCoords[0].toFixed(5)}, ${addToiletCoords[1].toFixed(5)}`;
                document.getElementById('addHint').style.color = 'var(--primary)';
            }, 600);
        });
        myMap.events.add('pressend', () => {
            clearTimeout(longPressTimer);
        });

    } catch (err) {
        console.error('❌ Ошибка инициализации карты:', err);
        setTimeout(initMap, 1000);
    }
}

// Запуск карты
if (typeof ymaps !== 'undefined') {
    ymaps.ready(initMap);
} else {
    console.warn('⚠️ Яндекс.Карты не загружены, повторная попытка...');
    setTimeout(() => {
        if (typeof ymaps !== 'undefined') {
            ymaps.ready(initMap);
        }
    }, 2000);
}

        // ============================================================
        //  ЗАГРУЗКА ТУАЛЕТОВ
        // ============================================================
        async function loadToilets() {
            try {
                const res = await fetch(`${API_URL}/toilets`);
                allToilets = await res.json();
                renderMarkers();
            } catch (err) {
                console.error('Ошибка загрузки:', err);
            }
        }

        function renderMarkers() {
            if (!myMap) return;
            myMap.geoObjects.removeAll();

            let filtered = allToilets;

            // Поиск
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (query) {
                filtered = filtered.filter(t => t.title.toLowerCase().includes(query));
            }

            // Категория
            if (currentCategory === 'taharatkhana') {
                filtered = filtered.filter(t => t.isTaharatkhana);
            } else if (currentCategory === 'free') {
                filtered = filtered.filter(t => t.isFree);
            } else if (currentCategory === 'soap') {
                filtered = filtered.filter(t => t.hasSoap);
            } else if (currentCategory === 'paper') {
                filtered = filtered.filter(t => t.hasPaper);
            } else if (currentCategory === 'accessible') {
                filtered = filtered.filter(t => t.isAccessible);
            } else if (currentCategory === 'open') {
                filtered = filtered.filter(t => t.isOpen);
            }

            filtered.forEach(toilet => {
                const color = toilet.isFree ? 'green' : 'orange';
                const placemark = new ymaps.Placemark(
                    [toilet.lat, toilet.lon], {
                        balloonContent: toilet.title,
                        hintContent: toilet.title
                    }, {
                        preset: `islands#${color}DotIcon`,
                        iconColor: toilet.isTaharatkhana ? '#8B5CF6' : undefined
                    }
                );
                placemark.events.add('click', () => showToiletSheet(toilet));
                myMap.geoObjects.add(placemark);
            });
        }

        // ============================================================
        //  ПОИСК (с debounce)
        // ============================================================
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                renderMarkers();
            }, 300);
        });

        // ============================================================
        //  КАТЕГОРИИ
        // ============================================================
        document.querySelectorAll('.category-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
                renderMarkers();
            });
        });

        // ============================================================
        //  КАРТОЧКА ТУАЛЕТА
        // ============================================================
        async function showToiletSheet(toilet) {
            selectedToilet = toilet;
            const sheet = document.getElementById('toiletSheet');
            sheet.classList.add('active');

            document.getElementById('sheetTitle').textContent = toilet.title;

            // Рейтинг
            const reviews = await loadReviews(toilet.id);
            const avg = reviews.length > 0 ?
                (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length) :
                0;
            document.getElementById('sheetStars').textContent = getStarString(avg);
            document.getElementById('sheetRatingValue').textContent = avg > 0 ? avg.toFixed(1) : '—';
            document.getElementById('sheetRatingCount').textContent =
                reviews.length > 0 ? `(${reviews.length} ${t('reviews')})` : t('noReviews');

            // Расстояние
            if (myMap) {
                const center = myMap.getCenter();
                const dist = ymaps.coordSystem.geo.getDistance(
                    [toilet.lat, toilet.lon],
                    [center[0], center[1]]
                );
                const km = (dist / 1000).toFixed(1);
                document.getElementById('sheetDistance').textContent = `📍 ${km} ${t('kmAway')}`;
            }

            // Бейджи
            const badges = [];
            badges.push({
                text: toilet.isOpen ? t('openStatus') : t('closedStatus'),
                cls: toilet.isOpen ? 'open' : 'closed'
            });
            badges.push({
                text: toilet.isFree ? t('freeLabel') : t('paidLabel'),
                cls: toilet.isFree ? 'free' : 'paid'
            });
            if (toilet.hasSoap) badges.push({ text: '🧼 Мыло', cls: '' });
            if (toilet.hasPaper) badges.push({ text: '🧻 Бумага', cls: '' });
            if (toilet.isAccessible) badges.push({ text: '♿ Доступно', cls: '' });
            if (toilet.isTaharatkhana) badges.push({ text: '🕌 Тахаратхана', cls: '' });

            document.getElementById('sheetBadges').innerHTML = badges.map(b =>
                `<span class="sheet-badge ${b.cls}">${b.text}</span>`
            ).join('');

            // Описание
            document.getElementById('sheetDescription').textContent =
                toilet.description || 'Нет описания';

            // Отзывы
            renderReviews(reviews);

            // Сброс формы
            document.getElementById('reviewText').value = '';
            reviewRating = 0;
            document.querySelectorAll('.star-select span').forEach(s => s.textContent = '☆');
            document.getElementById('reviewHint').textContent = '';
            document.getElementById('reviewHint').className = 'hint';

            // Проверка авторизации для отзыва
            if (!currentUser) {
                document.getElementById('reviewHint').textContent = t('pleaseLogin');
                document.getElementById('reviewHint').className = 'hint error';
            }
        }

        function renderReviews(reviews) {
            const container = document.getElementById('sheetReviews');
            if (!reviews || reviews.length === 0) {
                container.innerHTML = `<p style="color:var(--text-secondary);font-size:14px;">${t('noReviews')}</p>`;
                return;
            }

            container.innerHTML = reviews.slice().reverse().map(r => {
                const name = r.userPhone || 'Аноним';
                const initials = getInitials(name);
                const color = getRandomColor(name.length);
                return `
                    <div class="sheet-review">
                        <div class="review-avatar" style="background:${color}">${initials}</div>
                        <div class="review-body">
                            <div>
                                <span class="review-name">${name}</span>
                                <span class="review-date">${formatDate(r.createdAt)}</span>
                            </div>
                            <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
                            <div class="review-text">${r.text}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function loadReviews(toiletId) {
            try {
                const res = await fetch(`${API_URL}/reviews/${toiletId}`);
                return await res.json();
            } catch {
                return [];
            }
        }

        // ============================================================
        //  ЗАКРЫТИЕ КАРТОЧКИ
        // ============================================================
        document.getElementById('sheetClose').addEventListener('click', () => {
            document.getElementById('toiletSheet').classList.remove('active');
            selectedToilet = null;
        });

        // ============================================================
        //  ЗВЁЗДЫ ДЛЯ ОТЗЫВА
        // ============================================================
        document.querySelectorAll('.star-select span').forEach(el => {
            el.addEventListener('click', function() {
                reviewRating = parseInt(this.dataset.star);
                document.querySelectorAll('.star-select span').forEach((s, i) => {
                    s.textContent = i < reviewRating ? '★' : '☆';
                    s.style.color = i < reviewRating ? 'var(--star-color)' : 'var(--border)';
                });
            });
        });

        // ============================================================
        //  ОТПРАВКА ОТЗЫВА
        // ============================================================
        document.getElementById('reviewSubmit').addEventListener('click', async () => {
            if (!currentUser) {
                document.getElementById('reviewHint').textContent = t('pleaseLogin');
                document.getElementById('reviewHint').className = 'hint error';
                return;
            }
            if (!selectedToilet) return;

            const text = document.getElementById('reviewText').value.trim();
            if (!text || reviewRating === 0) {
                document.getElementById('reviewHint').textContent = 'Введите текст и поставьте оценку';
                document.getElementById('reviewHint').className = 'hint error';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/reviews`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.token}`
                    },
                    body: JSON.stringify({
                        toiletId: selectedToilet.id,
                        text,
                        rating: reviewRating
                    })
                });
                if (res.ok) {
                    document.getElementById('reviewHint').textContent = t('success');
                    document.getElementById('reviewHint').className = 'hint success';
                    showToiletSheet(selectedToilet);
                } else {
                    document.getElementById('reviewHint').textContent = t('error');
                    document.getElementById('reviewHint').className = 'hint error';
                }
            } catch {
                document.getElementById('reviewHint').textContent = t('error');
                document.getElementById('reviewHint').className = 'hint error';
            }
        });

        // ============================================================
        //  МАРШРУТ
        // ============================================================
        document.getElementById('routeBtn').addEventListener('click', () => {
            if (!selectedToilet) return;
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const url =
                        `https://yandex.ru/maps/?rtext=${pos.coords.latitude},${pos.coords.longitude}~${selectedToilet.lat},${selectedToilet.lon}&rtt=pd`;
                    window.open(url, '_blank');
                },
                () => {
                    const url =
                        `https://yandex.ru/maps/?rtext=~${selectedToilet.lat},${selectedToilet.lon}&rtt=pd`;
                    window.open(url, '_blank');
                }
            );
        });

        // ============================================================
        //  ДОБАВЛЕНИЕ ТУАЛЕТА (АДМИН)
        // ============================================================
        document.querySelector('.nav-item[data-tab="add"]').addEventListener('click', () => {
            if (!currentUser || currentUser.role !== 'admin') {
                alert(t('adminOnly'));
                return;
            }
            document.getElementById('addModal').classList.add('active');
            document.getElementById('addHint').textContent = t('addHint');
            document.getElementById('addHint').style.color = 'var(--text-secondary)';
        });

        document.getElementById('addClose').addEventListener('click', () => {
            document.getElementById('addModal').classList.remove('active');
            addToiletCoords = null;
        });

        document.getElementById('addSubmit').addEventListener('click', async () => {
            if (!currentUser || currentUser.role !== 'admin') {
                alert(t('adminOnly'));
                return;
            }

            const title = document.getElementById('addTitle').value.trim();
            if (!title) return alert('Введите название');
            if (!addToiletCoords) return alert('Нажмите на карте, чтобы выбрать место');

            const toiletData = {
                lat: addToiletCoords[0],
                lon: addToiletCoords[1],
                title: title,
                description: document.getElementById('addDescription').value.trim() || '',
                photo: document.getElementById('addPhoto').value.trim() || '',
                isOpen: document.getElementById('addIsOpen').checked,
                isFree: document.getElementById('addIsFree').checked,
                hasSoap: document.getElementById('addHasSoap').checked,
                hasPaper: document.getElementById('addHasPaper').checked,
                isAccessible: document.getElementById('addIsAccessible').checked,
                isTaharatkhana: document.getElementById('addIsTaharatkhana').checked
            };

            try {
                const res = await fetch(`${API_URL}/toilets`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.token}`
                    },
                    body: JSON.stringify(toiletData)
                });
                if (res.ok) {
                    document.getElementById('addModal').classList.remove('active');
                    addToiletCoords = null;
                    await loadToilets();
                    alert('✅ Туалет добавлен!');
                } else {
                    const data = await res.json();
                    alert(data.error || 'Ошибка');
                }
            } catch {
                alert('Ошибка соединения');
            }
        });

        // ============================================================
        //  КНОПКА "НАЙТИ РЯДОМ" (через поиск)
        // ============================================================
        document.getElementById('searchInput').addEventListener('focus', function() {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    if (myMap) {
                        myMap.setCenter([pos.coords.latitude, pos.coords.longitude], 14);
                    }
                },
                () => {}
            );
        });

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ UI
        // ============================================================
        updateUI();

        // Показываем/скрываем кнопку "Добавить" в навигации
        if (currentUser && currentUser.role === 'admin') {
            document.getElementById('navAdd').style.display = 'flex';
        } else {
            document.getElementById('navAdd').style.display = 'none';
        }

        console.log('🚽 ToiletAdvisor v2.0 загружен!');
        console.log('👤 Текущий пользователь:', currentUser || 'не авторизован');
    </script>
</body>
</html>
